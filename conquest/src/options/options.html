<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conquest — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="cq-options-app">
    <aside class="cq-options-sidebar">
      <div class="cq-options-sidebar__brand">
        <div>
          <div class="cq-options-sidebar__name">Conquest</div>
        </div>
      </div>

      <nav class="cq-options-sidebar__nav">
        <a class="cq-options-sidebar__nav-item" href="#provider-section">Provider</a>
        <a class="cq-options-sidebar__nav-item" href="#capture-section">Capture</a>
        <a class="cq-options-sidebar__nav-item" href="#shortcuts-section">Shortcut</a>
        <a class="cq-options-sidebar__nav-item" href="#models-section">Models</a>
        <a class="cq-options-sidebar__nav-item" href="#log-section">Log</a>
      </nav>
    </aside>

    <main class="cq-options">
      <header class="cq-options__hero">
        <h1 class="cq-options__title">Settings</h1>
      </header>

      <section id="provider-section" class="cq-options__section">
        <div class="cq-options__section-head">
          <h2 class="cq-options__section-title">Provider</h2>
        </div>

        <div class="cq-options__rows">
          <div class="cq-options__row">
            <div class="cq-options__row-copy">
              <label class="cq-options__label" for="provider-select">Provider</label>
            </div>
            <div class="cq-options__row-control">
              <select id="provider-select" class="cq-select">
                <option value="ollama">Ollama</option>
                <option value="openai-compatible">OpenAI-style API server</option>
              </select>
            </div>
          </div>

          <div id="openai-preset-field" class="cq-options__row" hidden>
            <div class="cq-options__row-copy">
              <label class="cq-options__label" for="preset-select">Preset</label>
            </div>
            <div class="cq-options__row-control">
              <select id="preset-select" class="cq-select">
                <option value="">Custom</option>
                <optgroup label="Local / Private">
                  <option value="lm-studio">LM Studio (localhost:1234)</option>
                  <option value="localai">LocalAI (localhost:8080)</option>
                  <option value="llama-cpp">llama.cpp (localhost:8080)</option>
                  <option value="jan">Jan.ai (localhost:1337)</option>
                  <option value="vllm">vLLM (localhost:8000)</option>
                </optgroup>
                <optgroup label="Cloud">
                  <option value="openai">OpenAI</option>
                  <option value="openrouter">OpenRouter</option>
                  <option value="together">Together AI</option>
                  <option value="fireworks">Fireworks AI</option>
                </optgroup>
              </select>
            </div>
          </div>

          <div class="cq-options__row">
            <div class="cq-options__row-copy">
              <label class="cq-options__label" for="endpoint-input">Endpoint URL</label>
            </div>
            <div class="cq-options__row-control">
              <input id="endpoint-input" class="cq-input" type="url" placeholder="http://localhost:11434">
            </div>
          </div>

          <div id="api-key-field" class="cq-options__row" hidden>
            <div class="cq-options__row-copy">
              <label class="cq-options__label" for="api-key-input">API Key</label>
            </div>
            <div class="cq-options__row-control">
              <input id="api-key-input" class="cq-input" type="password" placeholder="Leave blank for local/private servers">
            </div>
          </div>

          <div class="cq-options__row">
            <div class="cq-options__row-copy">
              <label class="cq-options__label" for="model-input">Model</label>
            </div>
            <div class="cq-options__row-control">
              <input id="model-input" class="cq-input" type="text" list="model-suggestions" placeholder="qwen2.5vl:7b">
              <datalist id="model-suggestions"></datalist>
              <select id="model-select" class="cq-select" hidden></select>
              <p id="model-help" class="cq-options__hint"></p>
            </div>
          </div>

          <div class="cq-options__row cq-options__row--actions">
            <div class="cq-options__row-copy">
              <div class="cq-options__label">Connection</div>
            </div>
            <div class="cq-options__row-control cq-options__row-control--actions">
              <button id="test-connection-btn" class="cq-btn--secondary">Check</button>
              <div id="test-result" class="cq-options__test-result" hidden></div>
            </div>
          </div>
        </div>
      </section>

      <section id="capture-section" class="cq-options__section">
        <div class="cq-options__section-head">
          <h2 class="cq-options__section-title">Capture</h2>
        </div>

        <div class="cq-options__rows">
          <div class="cq-options__row">
            <div class="cq-options__row-copy">
              <label class="cq-options__label" for="capture-mode-select">Default Mode</label>
            </div>
            <div class="cq-options__row-control">
              <select id="capture-mode-select" class="cq-select">
                <option value="fullpage">Full Page</option>
                <option value="region">Region</option>
              </select>
            </div>
          </div>

          <div class="cq-options__row">
            <div class="cq-options__row-copy">
              <div class="cq-options__label">Auto-capture</div>
            </div>
            <div class="cq-options__row-control">
              <div id="auto-capture-toggle" class="cq-toggle">
                <div id="auto-capture-track" class="cq-toggle__track">
                  <div class="cq-toggle__knob"></div>
                </div>
                <span class="cq-toggle__label">Auto-capture on known platforms</span>
              </div>
            </div>
          </div>

          <div class="cq-options__row">
            <div class="cq-options__row-copy">
              <label class="cq-options__label" for="timeout-input">Timeout (ms)</label>
            </div>
            <div class="cq-options__row-control">
              <input id="timeout-input" class="cq-input" type="number" min="5000" max="120000" step="1000" placeholder="30000">
            </div>
          </div>
        </div>
      </section>

      <section id="shortcuts-section" class="cq-options__section">
        <div class="cq-options__section-head">
          <h2 class="cq-options__section-title">Shortcut</h2>
        </div>

        <div class="cq-options__rows">
          <div class="cq-options__row">
            <div class="cq-options__row-copy">
              <label class="cq-options__label">Shortcut</label>
            </div>
            <div class="cq-options__row-control">
              <input id="shortcut-display" class="cq-input" type="text" value="Alt+Q" readonly>
            </div>
          </div>
        </div>
      </section>

      <section id="models-section" class="cq-options__section">
        <div class="cq-options__section-head">
          <h2 class="cq-options__section-title">Models</h2>
        </div>

        <div id="model-recommendations" class="cq-options__models"></div>
      </section>

      <section id="log-section" class="cq-options__section">
        <div class="cq-options__section-head">
          <h2 class="cq-options__section-title">Log</h2>
        </div>
        <div id="log-container" class="cq-options__log-container"></div>
      </section>
    </main>
  </div>
  <script type="module" src="options.ts"></script>
</body>
</html>
