<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conquest</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="cq-popup">
    <header class="cq-popup__header">
      <div class="cq-popup__logo">
        <h1 class="cq-popup__title">Conquest</h1>
      </div>
      <div class="cq-popup__header-actions">
        <button id="settings-btn" class="cq-popup__settings-btn" aria-label="Settings">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 13a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="1.5"/>
            <path d="M16.5 10a6.5 6.5 0 01-.4 2.2l1.7 1.3-1.5 2.6-2-.6a6.5 6.5 0 01-1.9 1.1l-.4 2.1h-3l-.4-2.1a6.5 6.5 0 01-1.9-1.1l-2 .6-1.5-2.6 1.7-1.3A6.5 6.5 0 013.5 10c0-.8.1-1.5.4-2.2L2.2 6.5l1.5-2.6 2 .6A6.5 6.5 0 017.6 3.4L8 1.3h3l.4 2.1a6.5 6.5 0 011.9 1.1l2-.6 1.5 2.6-1.7 1.3c.3.7.4 1.4.4 2.2z" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="error-banner" class="cq-error-banner" hidden></div>

    <div id="status-chip" class="cq-card cq-card--status">
      <span id="status-dot" class="cq-status-dot"></span>
      <span id="status-text" class="cq-status-text">&mdash;</span>
    </div>

    <div id="answer-card" class="cq-card cq-card--answer" hidden>
      <div class="cq-card__header">
        <span class="cq-card__kicker">Last answer</span>
        <span id="confidence-badge" class="cq-confidence-badge"></span>
      </div>
      <div id="answer-text" class="cq-card__answer-text"></div>
    </div>

    <div id="answer-empty" class="cq-card cq-card--empty">
      <span class="cq-card__empty-text">No capture yet</span>
    </div>

    <div id="capture-loading" class="cq-card cq-card--loading" hidden>
      <div class="cq-capture-spinner" aria-hidden="true"></div>
      <div>
        <div id="capture-loading-title" class="cq-capture-loading__title">Analyzing...</div>
        <div id="capture-loading-text" class="cq-capture-loading__text">Waiting for the model to respond.</div>
      </div>
    </div>

    <div class="cq-popup__chips">
      <span id="platform-chip" class="cq-chip" hidden></span>
      <button id="log-count-chip" class="cq-chip cq-chip--interactive">
        <span id="log-count">0</span> captures
      </button>
    </div>

    <div class="cq-popup__actions">
      <button id="capture-fullpage-btn" class="cq-popup__action-btn">Full Page</button>
      <button id="capture-region-btn" class="cq-popup__action-btn">Region</button>
    </div>
  </div>
  <script type="module" src="popup.ts"></script>
</body>
</html>
