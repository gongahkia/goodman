<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TC Guard</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --tc-bg: #ffffff;
        --tc-surface: #f8f9fa;
        --tc-text: #1a1a1a;
        --tc-text-secondary: #6b7280;
        --tc-text-tertiary: #9ca3af;
        --tc-border: #e5e7eb;
        --tc-accent: #2563eb;
        --tc-accent-hover: #1d4ed8;
        --tc-accent-text: #ffffff;
        --tc-focus-ring: rgba(37, 99, 235, 0.5);
        --tc-hover-bg: #f3f4f6;
        --tc-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --tc-radius-md: 8px;
        --tc-radius-lg: 12px;
        --tc-shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
        --tc-severity-low: #22c55e;
        --tc-severity-medium: #eab308;
        --tc-severity-high: #f97316;
        --tc-severity-critical: #ef4444;
      }
      body {
        width: 400px;
        max-height: 600px;
        font-family: var(--tc-font-family);
        font-size: 14px;
        color: var(--tc-text);
        background: var(--tc-bg);
        overflow-y: auto;
      }
      #app { padding: 16px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
